<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Greenprint — Go Live</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Urbanist:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;background:#050505;color:#f0faf3;font-family:'Urbanist',sans-serif}
nav{position:fixed;top:0;left:0;right:0;height:56px;background:rgba(5,5,5,.96);border-bottom:1px solid rgba(255,255,255,.06);display:flex;align-items:center;justify-content:space-between;padding:0 24px;z-index:100}
.brand{font-family:'Syne',sans-serif;font-weight:800;font-size:.8rem;letter-spacing:.22em;text-transform:uppercase;display:flex;align-items:center;gap:8px}
.dot{width:6px;height:6px;border-radius:50%;background:#00ff87;box-shadow:0 0 8px rgba(0,255,135,.5)}
.dot.live{background:#ff3b5c;box-shadow:0 0 8px rgba(255,59,92,.6);animation:pulse 1.8s infinite}
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(255,59,92,.5)}70%{box-shadow:0 0 0 8px rgba(255,59,92,0)}100%{box-shadow:0 0 0 0 rgba(255,59,92,0)}}
#nstat{font-size:.6rem;font-weight:600;letter-spacing:.18em;color:rgba(240,250,243,.2)}
#nstat.on{color:rgba(255,59,92,.7)}
#nvc{font-size:.6rem;color:rgba(240,250,243,.25);display:none}
#nvc.on{display:block}
body{padding-top:56px}
.wrap{display:grid;grid-template-columns:1fr 310px;height:calc(100vh - 56px)}
@media(max-width:920px){.wrap{grid-template-columns:1fr}}
.vcol{display:flex;flex-direction:column;background:#000}
.stage{flex:1;position:relative;background:#030303;overflow:hidden}
#scrnv{width:100%;height:100%;object-fit:contain;display:none}
#campip{position:absolute;bottom:14px;right:14px;width:200px;display:none;flex-direction:column;border:1px solid rgba(255,255,255,.12);background:#000;box-shadow:0 6px 24px rgba(0,0,0,.7);z-index:10}
#campip.show{display:flex}
#campip.mini{width:64px}
#campip.mini #camv{height:48px}
#campip.mini .pip-label{display:none}
#camv{width:100%;height:120px;object-fit:cover;display:block;background:#111;transform:scaleX(-1)}
.pip-bar{background:rgba(8,8,8,.92);padding:3px 7px;display:flex;align-items:center;justify-content:space-between;border-top:1px solid rgba(255,255,255,.06)}
.pip-label{font-size:.52rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:rgba(0,255,135,.4)}
.pip-btns{display:flex;gap:2px}
.pb{background:none;border:none;color:rgba(240,250,243,.3);cursor:pointer;font-size:.72rem;padding:1px 4px;line-height:1}
.pb:hover{color:rgba(240,250,243,.75)}
.ph{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;background:#030303;text-align:center;padding:40px}
.ph::before{content:'';position:absolute;inset:0;background-image:linear-gradient(rgba(0,255,135,.012) 1px,transparent 1px),linear-gradient(90deg,rgba(0,255,135,.012) 1px,transparent 1px);background-size:52px 52px}
.ph-t{font-weight:300;font-size:.95rem;letter-spacing:.25em;text-transform:uppercase;color:rgba(240,250,243,.1);position:relative;z-index:1}
.ph-s{font-size:.7rem;font-weight:300;color:rgba(240,250,243,.1);line-height:1.8;position:relative;z-index:1}
.ctrl{background:rgba(4,4,4,.98);border-top:1px solid rgba(255,255,255,.05);padding:12px 16px;display:flex;flex-direction:column;gap:10px}
.trow{display:flex;gap:7px}
#titinp{flex:1;height:38px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);color:#f0faf3;padding:0 13px;font-family:'Urbanist',sans-serif;font-size:.82rem;outline:none;border-radius:0}
#titinp:focus{border-color:rgba(0,255,135,.25)}
#titinp::placeholder{color:rgba(240,250,243,.18)}
.tpush{height:38px;padding:0 12px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);color:rgba(240,250,243,.4);cursor:pointer;font-family:'Urbanist',sans-serif;font-size:.58rem;font-weight:600;letter-spacing:.12em;text-transform:uppercase}
.tpush:hover{border-color:rgba(0,255,135,.2);color:rgba(0,255,135,.6)}
.btns{display:flex;gap:7px;flex-wrap:wrap}
.btn{height:38px;padding:0 14px;border:none;cursor:pointer;font-family:'Urbanist',sans-serif;font-weight:700;font-size:.6rem;letter-spacing:.14em;text-transform:uppercase;transition:all .15s;white-space:nowrap;border-radius:0}
#bGo{background:linear-gradient(135deg,#00ff87,#00c853);color:#020202;flex:1;min-width:90px}
#bGo:hover{opacity:.88}
#bGo:disabled{opacity:.35;cursor:not-allowed}
#bEnd{background:rgba(255,59,92,.08);border:1px solid rgba(255,59,92,.22);color:rgba(255,59,92,.65);display:none}
#bEnd:hover{background:rgba(255,59,92,.16)}
#bMic{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);color:rgba(240,250,243,.42)}
#bMic.off{background:rgba(255,59,92,.07);border-color:rgba(255,59,92,.2);color:rgba(255,59,92,.6)}
#bCam{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);color:rgba(240,250,243,.42)}
#bCam.on{background:rgba(0,255,135,.05);border-color:rgba(0,255,135,.18);color:rgba(0,255,135,.65)}
#bSwitch{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);color:rgba(240,250,243,.42)}
.slog{font-size:.62rem;font-weight:300;color:rgba(240,250,243,.2);line-height:1.55}
#slogtxt{color:rgba(0,255,135,.38)}
.ccol{display:flex;flex-direction:column;background:#070707;border-left:1px solid rgba(255,255,255,.05)}
@media(max-width:920px){.ccol{display:none}}
.chd{padding:11px 14px;border-bottom:1px solid rgba(255,255,255,.05);display:flex;align-items:center;justify-content:space-between}
.chl{font-size:.56rem;font-weight:600;letter-spacing:.2em;text-transform:uppercase;color:rgba(240,250,243,.2)}
#cvc{font-size:.56rem;font-weight:600;color:rgba(0,255,135,.35)}
.feed{flex:1;overflow-y:auto;padding:10px;display:flex;flex-direction:column;gap:9px}
.feed::-webkit-scrollbar{width:2px}
.feed::-webkit-scrollbar-thumb{background:rgba(0,200,83,.13)}
.mi{display:flex;align-items:flex-start;gap:5px}
.ml{flex:1;min-width:0}
.mn{font-size:.6rem;font-weight:600;color:rgba(0,255,135,.48)}
.mn.h{color:#00ff87}
.mt{font-size:.76rem;font-weight:300;color:rgba(240,250,243,.55);line-height:1.5;word-break:break-word}
.mt.s{color:rgba(255,255,255,.16);font-style:italic;font-size:.7rem}
.kbtn{flex-shrink:0;background:none;border:none;color:rgba(255,59,92,.28);cursor:pointer;font-size:.85rem;padding:1px 3px;line-height:1;margin-top:1px}
.kbtn:hover{color:rgba(255,59,92,.75)}
.cft{padding:8px 10px;border-top:1px solid rgba(255,255,255,.05);display:flex;gap:5px}
.cin{flex:1;height:34px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);color:#f0faf3;padding:0 10px;font-family:'Urbanist',sans-serif;font-size:.78rem;outline:none;border-radius:0}
.cin:focus{border-color:rgba(0,255,135,.2)}
.cin::placeholder{color:rgba(240,250,243,.14)}
.csnd{height:34px;padding:0 10px;background:rgba(0,255,135,.05);border:1px solid rgba(0,255,135,.1);color:rgba(0,255,135,.52);cursor:pointer;font-family:'Urbanist',sans-serif;font-size:.56rem;font-weight:600;letter-spacing:.08em;text-transform:uppercase}
.csnd:hover{background:rgba(0,255,135,.1);color:#00ff87}
</style>
</head>
<body>
<nav>
  <div class="brand"><div class="dot" id="ndot"></div>THE GREENPRINT</div>
  <div style="display:flex;align-items:center;gap:14px">
    <span id="nstat">ready</span>
    <span id="nvc">👁 <span id="nvcn">0</span></span>
  </div>
</nav>

<div class="wrap">
  <div class="vcol">
    <div class="stage">
      <video id="scrnv" autoplay muted playsinline></video>
      <div id="campip">
        <video id="camv" autoplay muted playsinline></video>
        <div class="pip-bar">
          <span class="pip-label">Camera</span>
          <div class="pip-btns">
            <button class="pb" onclick="pipMinToggle()">▢</button>
            <button class="pb" onclick="camOff()">✕</button>
          </div>
        </div>
      </div>
      <div class="ph" id="ph">
        <div class="ph-t">Ready to go live</div>
        <div class="ph-s">Click Go Live to share your screen.</div>
      </div>
    </div>
    <div class="ctrl">
      <div class="trow">
        <input id="titinp" type="text" placeholder="Stream title…" value="The Greenprint — Live Session">
        <button class="tpush" onclick="pushTitle()">Push</button>
      </div>
      <div class="btns">
        <button class="btn" id="bGo"     onclick="goLive()">🔴 Go Live</button>
        <button class="btn" id="bEnd"    onclick="endStream()">⏹ End</button>
        <button class="btn" id="bMic"    onclick="toggleMic()">🎙 Mic</button>
        <button class="btn" id="bCam"    onclick="toggleCam()">📷 Camera</button>
        <button class="btn" id="bSwitch" onclick="switchScreen()">🖥 Switch</button>
      </div>
      <div class="slog">Status: <span id="slogtxt">Loading…</span></div>
    </div>
  </div>
  <div class="ccol">
    <div class="chd"><span class="chl">Live Chat</span><span id="cvc">0 viewers</span></div>
    <div class="feed" id="feed"></div>
    <div class="cft">
      <input class="cin" id="ci" placeholder="Reply to viewers…" maxlength="200" onkeydown="if(event.key==='Enter')hostChat()">
      <button class="csnd" onclick="hostChat()">Send</button>
    </div>
  </div>
</div>

<canvas id="cv" style="display:none"></canvas>

<script>
// ── Fixed peer ID — must exactly match HOST_PEER_ID in stream.html ──
var PEER_ID = 'gp-greenprint-live';

// ── ICE config: multiple STUN + public TURN relay servers ──
var ICE = {
  iceServers:[
    {urls:'stun:stun.l.google.com:19302'},
    {urls:'stun:stun1.l.google.com:19302'},
    {urls:'stun:stun2.l.google.com:19302'},
    {urls:'stun:stun3.l.google.com:19302'},
    {urls:'stun:stun4.l.google.com:19302'},
    {urls:'turn:openrelay.metered.ca:80',   username:'openrelayproject',credential:'openrelayproject'},
    {urls:'turn:openrelay.metered.ca:443',  username:'openrelayproject',credential:'openrelayproject'},
    {urls:'turns:openrelay.metered.ca:443', username:'openrelayproject',credential:'openrelayproject'}
  ]
};

var _peer=null, _screenStream=null, _micStream=null, _camStream=null;
var _live=false, _micOn=true, _camOn=false, _pipMini=false;
var _drawInterval=null, _outStream=null;
var _viewers={}, _banned=[];
var _canvas=document.getElementById('cv'), _ctx=_canvas.getContext('2d');

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function log(t){document.getElementById('slogtxt').textContent=t;console.log('[HOST]',t);}
function sys(t){
  var f=document.getElementById('feed'),d=document.createElement('div');d.className='mi';
  var l=document.createElement('div');l.className='ml';
  l.innerHTML='<div class="mt s">'+esc(t)+'</div>';
  d.appendChild(l);f.appendChild(d);f.scrollTop=f.scrollHeight;
}
function addMsg(name,text,type,pid){
  var f=document.getElementById('feed'),d=document.createElement('div');d.className='mi';
  var l=document.createElement('div');l.className='ml';
  l.innerHTML='<div class="mn'+(type==='host'?' h':'')+'">'+esc(name)+'</div><div class="mt">'+esc(text)+'</div>';
  d.appendChild(l);
  if(pid){var k=document.createElement('button');k.className='kbtn';k.textContent='✕';k.onclick=(function(id){return function(){kick(id);};})(pid);d.appendChild(k);}
  f.appendChild(d);f.scrollTop=f.scrollHeight;
}
function setVC(n){
  document.getElementById('cvc').textContent=n+' viewer'+(n===1?'':'s');
  document.getElementById('nvcn').textContent=n;
  document.getElementById('nvc').className=n>0?'on':'';
}

// ── Canvas compositor: setInterval keeps running when tab is backgrounded ──
function initCanvas(){
  _canvas.width=1280;_canvas.height=720;
  _outStream=_canvas.captureStream(30);
  log('Canvas ready — '+_outStream.getVideoTracks().length+' video track(s)');
  _drawInterval=setInterval(function(){
    if(!_live)return;
    var sv=document.getElementById('scrnv');
    if(sv&&sv.readyState>=2){_ctx.drawImage(sv,0,0,1280,720);}
    else{_ctx.fillStyle='#030303';_ctx.fillRect(0,0,1280,720);}
    if(_camOn){
      var cv2=document.getElementById('camv');
      if(cv2&&cv2.readyState>=2){
        var pw=240,ph=135,px=1280-pw-18,py=720-ph-18;
        _ctx.save();_ctx.fillStyle='#000';_ctx.fillRect(px,py,pw,ph);_ctx.restore();
        _ctx.save();_ctx.translate(px+pw,py);_ctx.scale(-1,1);_ctx.drawImage(cv2,0,0,pw,ph);_ctx.restore();
      }
    }
  },33);
}

// ── Go Live ──
function goLive(){
  if(!navigator.mediaDevices||!navigator.mediaDevices.getDisplayMedia){
    log('Use Chrome or Edge for screen sharing.');return;
  }
  log('Choose your screen or window…');
  document.getElementById('bGo').disabled=true;
  navigator.mediaDevices.getDisplayMedia({
    video:{width:{ideal:1280},height:{ideal:720},frameRate:{ideal:30},cursor:'always'},
    audio:false
  }).then(function(scrn){
    _screenStream=scrn;
    document.getElementById('scrnv').srcObject=scrn;
    document.getElementById('scrnv').style.display='block';
    document.getElementById('ph').style.display='none';
    log('Screen captured — requesting mic…');
    return navigator.mediaDevices.getUserMedia({
      audio:{echoCancellation:true,noiseSuppression:true},video:false
    });
  }).then(function(mic){
    _micStream=mic;
    _live=true;
    initCanvas();
    log('Starting peer connection…');
    // Give canvas one full second to draw frames before connecting
    setTimeout(startPeer,1000);
  }).catch(function(e){
    if(e.name==='NotAllowedError'){
      log('Permission denied. On Mac: System Settings → Privacy → Screen Recording → allow Chrome');
    } else {
      log('Error: '+e.message);
    }
    document.getElementById('bGo').disabled=false;
  });
}

// ── PeerJS signaling + push model (broadcaster calls each viewer) ──
function startPeer(){
  // Destroy any existing peer first
  if(_peer){try{_peer.destroy();}catch(e){}_peer=null;}

  _peer=new Peer(PEER_ID,{
    host:'0.peerjs.com',port:443,path:'/',secure:true,
    config:ICE,
    debug:0
  });

  _peer.on('open',function(id){
    log('🔴 LIVE — Peer registered as: '+id);
    document.getElementById('ndot').className='dot live';
    document.getElementById('nstat').textContent='live';
    document.getElementById('nstat').className='on';
    document.getElementById('bGo').style.display='none';
    document.getElementById('bEnd').style.display='block';
    sys('🔴 You are live! Viewers opening stream.html will connect automatically.');
  });

  // Viewer opens data channel → broadcaster calls them back with the stream
  _peer.on('connection',function(dc){
    var pid=dc.peer;
    if(_banned.indexOf(pid)>-1){dc.close();return;}
    if(!_viewers[pid])_viewers[pid]={};
    _viewers[pid].dc=dc;

    dc.on('open',function(){
      var vname=(dc.metadata&&dc.metadata.name)?dc.metadata.name:'Viewer';
      _viewers[pid].name=vname;
      setVC(Object.keys(_viewers).length);
      sys(vname+' joined the stream.');
      pushTitle();

      // Call the viewer with canvas video + mic audio
      var aTracks=_micStream?_micStream.getAudioTracks():[];
      var vTracks=_outStream?_outStream.getVideoTracks():[];

      if(vTracks.length===0){
        log('Warning: no video tracks on canvas stream yet');
        sys('⚠ No video tracks yet. Canvas may need more time.');
        return;
      }

      log('Calling '+vname+' ('+vTracks.length+' video, '+aTracks.length+' audio tracks)…');
      var callStream=new MediaStream([].concat(vTracks).concat(aTracks));
      var call=_peer.call(pid,callStream,{config:ICE});
      _viewers[pid].call=call;

      if(call.peerConnection){
        call.peerConnection.oniceconnectionstatechange=function(){
          var s=call.peerConnection.iceConnectionState;
          log('ICE→'+vname+': '+s);
          if(s==='connected'||s==='completed'){
            sys('✅ '+vname+' is watching.');
          } else if(s==='failed'){
            sys('❌ ICE failed for '+vname+' — TURN relay may be needed');
          }
        };
      }
      call.on('close',function(){rmViewer(pid);});
      call.on('error',function(e){log('Call error: '+e.message);});
    });

    dc.on('data',function(raw){
      try{
        var m=JSON.parse(raw);
        if(m.t==='join')_viewers[pid].name=m.n||'Viewer';
        if(m.t==='chat'){
          addMsg(_viewers[pid].name||'Viewer',m.x,'viewer',pid);
          broadcast({t:'chat',n:_viewers[pid].name||'Viewer',x:m.x,h:false});
        }
      }catch(e){}
    });
    dc.on('close',function(){rmViewer(pid);});
  });

  _peer.on('error',function(e){
    log('Peer error: '+e.type+' — '+e.message);
    if(e.type==='unavailable-id'){
      // ID is taken from a prior session — wait 5s and retry
      log('ID in use. Retrying in 5s…');
      sys('⚠ Peer ID was busy — reconnecting in 5s…');
      setTimeout(function(){
        if(_peer){try{_peer.destroy();}catch(x){}}_peer=null;
        startPeer();
      },5000);
    }
    if(e.type==='server-error'||e.type==='network'){
      log('Server error — retrying in 8s…');
      setTimeout(function(){
        if(_peer){try{_peer.destroy();}catch(x){}}_peer=null;
        startPeer();
      },8000);
    }
  });

  _peer.on('disconnected',function(){
    log('Signaling disconnected — reconnecting…');
    try{_peer.reconnect();}catch(e){}
  });
}

function rmViewer(pid){
  if(_viewers[pid]){sys((_viewers[pid].name||'Viewer')+' left.');delete _viewers[pid];}
  setVC(Object.keys(_viewers).length);
}
function broadcast(obj){
  Object.keys(_viewers).forEach(function(pid){
    var dc=_viewers[pid].dc;
    if(dc&&dc.open)try{dc.send(JSON.stringify(obj));}catch(e){}
  });
}
function kick(pid){
  if(!_viewers[pid])return;
  var dc=_viewers[pid].dc,call=_viewers[pid].call;
  try{if(dc&&dc.open)dc.send(JSON.stringify({t:'kick'}));}catch(e){}
  setTimeout(function(){
    try{if(dc)dc.close();}catch(e){}
    try{if(call)call.close();}catch(e){}
    _banned.push(pid);rmViewer(pid);sys('Viewer removed.');
  },300);
}
function pushTitle(){
  var t=document.getElementById('titinp').value.trim()||'The Greenprint — Live Session';
  broadcast({t:'title',x:t});
}
function hostChat(){
  var inp=document.getElementById('ci'),txt=inp.value.trim();if(!txt)return;inp.value='';
  addMsg('Jacob (Host)',txt,'host',null);
  broadcast({t:'chat',n:'Jacob (Host)',x:txt,h:true});
}

function toggleMic(){
  if(!_micStream)return;
  _micOn=!_micOn;
  _micStream.getAudioTracks().forEach(function(t){t.enabled=_micOn;});
  document.getElementById('bMic').textContent=_micOn?'🎙 Mic':'🔇 Muted';
  document.getElementById('bMic').className='btn'+(_micOn?'':' off');
}
function toggleCam(){_camOn?camOff():camOn();}
function camOn(){
  navigator.mediaDevices.getUserMedia({video:{facingMode:'user'},audio:false})
  .then(function(s){
    _camStream=s;_camOn=true;
    document.getElementById('camv').srcObject=s;
    document.getElementById('campip').className='show';
    document.getElementById('bCam').textContent='📷 Cam On';
    document.getElementById('bCam').className='btn on';
  }).catch(function(e){log('Camera: '+e.message);});
}
function camOff(){
  if(_camStream)_camStream.getTracks().forEach(function(t){t.stop();});
  _camStream=null;_camOn=false;
  document.getElementById('camv').srcObject=null;
  document.getElementById('campip').className='';
  document.getElementById('bCam').textContent='📷 Camera';
  document.getElementById('bCam').className='btn';
}
function pipMinToggle(){
  _pipMini=!_pipMini;
  document.getElementById('campip').className=_pipMini?'show mini':'show';
}
function switchScreen(){
  navigator.mediaDevices.getDisplayMedia({
    video:{width:{ideal:1280},height:{ideal:720},frameRate:{ideal:30},cursor:'always'},
    audio:false
  }).then(function(s){
    var old=_screenStream?_screenStream.getVideoTracks():[];
    _screenStream=s;
    document.getElementById('scrnv').srcObject=s;
    old.forEach(function(t){t.stop();});
    log('Screen switched.');
  }).catch(function(){log('Switch cancelled.');});
}
function endStream(){
  if(!confirm('End the stream?'))return;
  broadcast({t:'ended'});
  clearInterval(_drawInterval);_live=false;
  [_screenStream,_micStream,_camStream].forEach(function(s){
    if(s)s.getTracks().forEach(function(t){t.stop();});
  });
  if(_peer)try{_peer.destroy();}catch(e){}
  _peer=null;
  document.getElementById('scrnv').style.display='none';
  document.getElementById('campip').className='';
  document.getElementById('ph').style.display='flex';
  document.getElementById('ph').querySelector('.ph-t').textContent='Stream Ended';
  document.getElementById('ph').querySelector('.ph-s').textContent='Reload the page to go live again.';
  document.getElementById('ndot').className='dot';
  document.getElementById('nstat').textContent='offline';
  document.getElementById('nstat').className='';
  document.getElementById('bEnd').style.display='none';
  document.getElementById('bGo').style.display='block';
  document.getElementById('bGo').disabled=false;
  setVC(0);log('Stream ended.');
}

// Load PeerJS from CDN
(function(){
  var s=document.createElement('script');
  s.src='https://cdnjs.cloudflare.com/ajax/libs/peerjs/1.5.2/peerjs.min.js';
  s.onload=function(){log('Ready — click Go Live.');};
  s.onerror=function(){log('Failed to load PeerJS. Check your internet connection.');};
  document.body.appendChild(s);
