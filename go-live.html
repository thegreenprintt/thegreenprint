<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Greenprint — Go Live</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Urbanist:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;background:#050505;color:#f0faf3;font-family:'Urbanist',sans-serif}
nav{position:fixed;top:0;left:0;right:0;height:56px;background:rgba(5,5,5,.96);border-bottom:1px solid rgba(255,255,255,.06);display:flex;align-items:center;justify-content:space-between;padding:0 24px;z-index:100}
.brand{font-family:'Syne',sans-serif;font-weight:800;font-size:.82rem;letter-spacing:.22em;text-transform:uppercase;display:flex;align-items:center;gap:8px}
.dot{width:6px;height:6px;border-radius:50%;background:#00ff87;box-shadow:0 0 8px rgba(0,255,135,.5)}
.dot.live{background:#ff3b5c;box-shadow:0 0 8px rgba(255,59,92,.7);animation:pulse 1.8s infinite}
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(255,59,92,.5)}70%{box-shadow:0 0 0 8px rgba(255,59,92,0)}100%{box-shadow:0 0 0 0 rgba(255,59,92,0)}}
#navstat{font-size:.6rem;font-weight:600;letter-spacing:.18em;color:rgba(240,250,243,.2)}
#navstat.on{color:rgba(255,59,92,.7)}
#vc{font-size:.6rem;color:rgba(240,250,243,.22);display:none}
#vc.on{display:flex;align-items:center;gap:4px}

body{padding-top:56px}
.wrap{display:grid;grid-template-columns:1fr 320px;height:calc(100vh - 56px)}
@media(max-width:960px){.wrap{grid-template-columns:1fr}}

/* VIDEO SIDE */
.vcol{display:flex;flex-direction:column;background:#000}
.stage{flex:1;position:relative;background:#030303}
#myv{width:100%;height:100%;object-fit:contain;display:none}
.ph{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;background:#030303;text-align:center;padding:40px}
.ph::before{content:'';position:absolute;inset:0;background-image:linear-gradient(rgba(0,255,135,.012) 1px,transparent 1px),linear-gradient(90deg,rgba(0,255,135,.012) 1px,transparent 1px);background-size:52px 52px}
.ph-t{font-weight:300;font-size:1rem;letter-spacing:.25em;text-transform:uppercase;color:rgba(240,250,243,.12);position:relative;z-index:1}
.ph-s{font-size:.72rem;font-weight:300;color:rgba(240,250,243,.12);line-height:1.8;position:relative;z-index:1}
.ctrl{background:rgba(4,4,4,.98);border-top:1px solid rgba(255,255,255,.05);padding:14px 18px;display:flex;flex-direction:column;gap:12px}
.title-row{display:flex;gap:8px}
#titinp{flex:1;height:40px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);color:#f0faf3;padding:0 14px;font-family:'Urbanist',sans-serif;font-size:.82rem;outline:none;transition:border-color .2s}
#titinp:focus{border-color:rgba(0,255,135,.25)}
#titinp::placeholder{color:rgba(240,250,243,.18)}
.tsave{height:40px;padding:0 14px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);color:rgba(240,250,243,.45);cursor:pointer;font-family:'Urbanist',sans-serif;font-size:.6rem;font-weight:600;letter-spacing:.14em;text-transform:uppercase}
.tsave:hover{border-color:rgba(0,255,135,.2);color:rgba(0,255,135,.6)}
.btns{display:flex;gap:8px;flex-wrap:wrap}
.btn{height:40px;padding:0 18px;border:none;cursor:pointer;font-family:'Urbanist',sans-serif;font-weight:700;font-size:.64rem;letter-spacing:.16em;text-transform:uppercase;transition:all .18s;white-space:nowrap}
#bStart{background:linear-gradient(135deg,#00ff87,#00c853);color:#020202;flex:1}
#bStart:hover{opacity:.9}
#bStart:disabled{opacity:.4;cursor:not-allowed}
#bEnd{background:rgba(255,59,92,.1);border:1px solid rgba(255,59,92,.25);color:rgba(255,59,92,.7);display:none}
#bEnd:hover{background:rgba(255,59,92,.18)}
#bMic{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);color:rgba(240,250,243,.45)}
#bMic:hover{border-color:rgba(0,255,135,.2)}
#bMic.muted{background:rgba(255,59,92,.08);border-color:rgba(255,59,92,.2);color:rgba(255,59,92,.6)}
#bScreen{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);color:rgba(240,250,243,.45)}
#bScreen:hover{border-color:rgba(0,255,135,.2)}
.stat{font-size:.64rem;font-weight:300;color:rgba(240,250,243,.22);line-height:1.6}
#slog{color:rgba(0,255,135,.4)}

/* CHAT SIDE */
.ccol{display:flex;flex-direction:column;background:#070707;border-left:1px solid rgba(255,255,255,.05)}
@media(max-width:960px){.ccol{display:none}}
.chd{padding:12px 16px;border-bottom:1px solid rgba(255,255,255,.05);display:flex;align-items:center;justify-content:space-between}
.chl{font-size:.58rem;font-weight:600;letter-spacing:.2em;text-transform:uppercase;color:rgba(240,250,243,.22)}
#cvc2{font-size:.58rem;font-weight:600;letter-spacing:.1em;color:rgba(0,255,135,.38)}
.feed{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:10px}
.feed::-webkit-scrollbar{width:2px}
.feed::-webkit-scrollbar-thumb{background:rgba(0,200,83,.15)}
.mi{display:flex;align-items:flex-start;gap:6px;justify-content:space-between}
.ml{flex:1;min-width:0}
.mn{font-size:.62rem;font-weight:600;color:rgba(0,255,135,.5)}
.mn.h{color:#00ff87}
.mn.s{color:rgba(255,255,255,.15)}
.mt{font-size:.78rem;font-weight:300;color:rgba(240,250,243,.58);line-height:1.55;word-break:break-word}
.mt.s{color:rgba(255,255,255,.18);font-style:italic;font-size:.72rem}
.kb{flex-shrink:0;background:none;border:none;color:rgba(255,59,92,.3);cursor:pointer;font-size:.9rem;line-height:1;padding:2px 4px;margin-top:1px}
.kb:hover{color:rgba(255,59,92,.8)}
.cft{padding:10px 12px;border-top:1px solid rgba(255,255,255,.05);display:flex;gap:6px}
.cin{flex:1;height:36px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);color:#f0faf3;padding:0 12px;font-family:'Urbanist',sans-serif;font-size:.8rem;outline:none;transition:border-color .2s}
.cin:focus{border-color:rgba(0,255,135,.22)}
.cin::placeholder{color:rgba(240,250,243,.15)}
.csnd{height:36px;padding:0 12px;background:rgba(0,255,135,.06);border:1px solid rgba(0,255,135,.12);color:rgba(0,255,135,.6);cursor:pointer;font-family:'Urbanist',sans-serif;font-size:.58rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase}
.csnd:hover{background:rgba(0,255,135,.12);color:#00ff87}
</style>
</head>
<body>
<nav>
  <div class="brand"><div class="dot" id="navdot"></div>THE GREENPRINT</div>
  <div style="display:flex;align-items:center;gap:16px">
    <span id="navstat">ready</span>
    <span id="vc">👁 <span id="vcn">0</span></span>
  </div>
</nav>

<div class="wrap">
  <div class="vcol">
    <div class="stage">
      <video id="myv" autoplay muted playsinline></video>
      <div class="ph" id="ph"><div class="ph-t">Ready to go live</div><div class="ph-s">Click "Go Live" below to start<br>sharing your screen with viewers.</div></div>
    </div>
    <div class="ctrl">
      <div class="title-row">
        <input id="titinp" type="text" placeholder="Stream title…" value="The Greenprint — Live Session">
        <button class="tsave" onclick="pushTitle()">Push</button>
      </div>
      <div class="btns">
        <button class="btn" id="bStart" onclick="goLive()">🔴 Go Live</button>
        <button class="btn" id="bEnd" onclick="endStream()">End Stream</button>
        <button class="btn" id="bMic" onclick="toggleMic()">🎙 Mic On</button>
        <button class="btn" id="bScreen" onclick="switchSource()">🖥 Screen</button>
      </div>
      <div class="stat">Status: <span id="slog">Waiting — click Go Live to begin.</span></div>
    </div>
  </div>

  <div class="ccol">
    <div class="chd"><span class="chl">Live Chat</span><span id="cvc2">0 viewers</span></div>
    <div class="feed" id="feed"></div>
    <div class="cft">
      <input class="cin" id="ci" placeholder="Reply to chat…" maxlength="200" onkeydown="if(event.key==='Enter')sendChat()">
      <button class="csnd" onclick="sendChat()">Send</button>
    </div>
  </div>
</div>

<script>
var PEER_ID='gp-stream-2025';
var _peer=null, _screen=null, _mic=null, _live=false, _micOn=true;
var _viewers={};   // peerId → {call, dc}
var _banned=[];
var _vcCount=0;

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function log(t){document.getElementById('slog').textContent=t;}
function sys(t){addMsg('',t,true,false,null);}
function addMsg(n,t,isSys,isHost,pid){
  var f=document.getElementById('feed'),d=document.createElement('div');d.className='mi';
  var l=document.createElement('div');l.className='ml';
  if(isSys){
    l.innerHTML='<div class="mt s">'+esc(t)+'</div>';
  } else {
    l.innerHTML='<div class="mn'+(isHost?' h':'')+'">'+esc(n)+'</div><div class="mt">'+esc(t)+'</div>';
  }
  d.appendChild(l);
  if(pid){
    var k=document.createElement('button');k.className='kb';k.title='Kick';k.textContent='✕';
    k.onclick=(function(id){return function(){kick(id);};})(pid);
    d.appendChild(k);
  }
  f.appendChild(d);f.scrollTop=f.scrollHeight;
}
function setVC(n){
  _vcCount=n;
  var s=n+' viewer'+(n===1?'':'s');
  document.getElementById('cvc2').textContent=s;
  document.getElementById('vcn').textContent=n;
  document.getElementById('vc').className=n>0?'on':'';
}

function goLive(){
  log('Requesting screen…');
  document.getElementById('bStart').disabled=true;
  navigator.mediaDevices.getDisplayMedia({
    video:{width:{ideal:1280},height:{ideal:720},frameRate:{ideal:30},cursor:'always'},
    audio:true
  }).then(function(screen){
    _screen=screen;
    document.getElementById('myv').srcObject=screen;
    document.getElementById('myv').style.display='block';
    document.getElementById('ph').style.display='none';
    return navigator.mediaDevices.getUserMedia({audio:{echoCancellation:true,noiseSuppression:true},video:false});
  }).then(function(mic){
    _mic=mic;
    startPeer();
  }).catch(function(e){
    log('Error: '+e.message+'. Try again.');
    document.getElementById('bStart').disabled=false;
  });
}

function startPeer(){
  log('Connecting…');
  _peer=new Peer(PEER_ID,{debug:0});
  _peer.on('open',function(id){
    _live=true;
    log('🔴 LIVE — viewers can join now.');
    document.getElementById('navdot').className='dot live';
    document.getElementById('navstat').textContent='live';document.getElementById('navstat').className='on';
    document.getElementById('bStart').style.display='none';
    document.getElementById('bEnd').style.display='inline-flex';
    document.getElementById('bEnd').style.display='block';
    sys('🔴 Stream started. Share thegreenprint.trade/stream.html with your audience.');
  });
  _peer.on('call',function(call){
    var vid=new MediaStream([..._screen.getVideoTracks(),...(_mic?_mic.getAudioTracks():[])]);
    call.answer(vid);
    var pid=call.peer;
    if(!_viewers[pid])_viewers[pid]={};
    _viewers[pid].call=call;
    call.on('close',function(){rmViewer(pid);});
  });
  _peer.on('connection',function(dc){
    var pid=dc.peer;
    if(_banned.indexOf(pid)>-1){dc.close();return;}
    if(!_viewers[pid])_viewers[pid]={};
    _viewers[pid].dc=dc;
    dc.on('open',function(){
      _viewers[pid].name=dc.metadata&&dc.metadata.name?dc.metadata.name:'Viewer';
      addViewer(pid);
      pushTitle();
    });
    dc.on('data',function(r){
      try{var m=JSON.parse(r);
        if(m.t==='join'){_viewers[pid].name=m.n||'Viewer';updateNames();}
        if(m.t==='chat'){addMsg(_viewers[pid].name||'Viewer',m.x,false,false,pid);broadcast({t:'chat',n:_viewers[pid].name||'Viewer',x:m.x,h:false});}
      }catch(x){}
    });
    dc.on('close',function(){rmViewer(pid);});
  });
  _peer.on('error',function(e){
    if(e.type==='unavailable-id'){log('Peer ID taken — try ending and going live again.');document.getElementById('bStart').disabled=false;}
    else{log('Connection error: '+e.message);}
  });
}

function addViewer(pid){
  setVC(Object.keys(_viewers).length);
  sys(((_viewers[pid]&&_viewers[pid].name)||'Someone')+' joined.');
}
function rmViewer(pid){
  delete _viewers[pid];
  setVC(Object.keys(_viewers).length);
}
function updateNames(){setVC(Object.keys(_viewers).length);}
function broadcast(obj){
  Object.keys(_viewers).forEach(function(pid){
    var dc=_viewers[pid].dc;
    if(dc&&dc.open)try{dc.send(JSON.stringify(obj));}catch(x){}
  });
}
function kick(pid){
  if(!pid||!_viewers[pid])return;
  var dc=_viewers[pid].dc, call=_viewers[pid].call;
  try{if(dc&&dc.open)dc.send(JSON.stringify({t:'kick'}));}catch(x){}
  setTimeout(function(){
    try{if(dc)dc.close();}catch(x){}
    try{if(call)call.close();}catch(x){}
    _banned.push(pid);
    rmViewer(pid);
    sys('Viewer removed.');
  },300);
}
function pushTitle(){
  var t=document.getElementById('titinp').value.trim()||'The Greenprint — Live Session';
  broadcast({t:'title',x:t});
}
function sendChat(){
  var i=document.getElementById('ci'),t=i.value.trim();if(!t)return;i.value='';
  addMsg('Jacob (Host)',t,false,true,null);
  broadcast({t:'chat',n:'Jacob (Host)',x:t,h:true});
}
function toggleMic(){
  if(!_mic)return;
  _micOn=!_micOn;
  _mic.getAudioTracks().forEach(function(tr){tr.enabled=_micOn;});
  var b=document.getElementById('bMic');
  b.textContent=_micOn?'🎙 Mic On':'🔇 Mic Off';
  b.className='btn'+(_micOn?'':' muted');
  log(_micOn?'Microphone on.':'Microphone muted.');
}
function switchSource(){
  navigator.mediaDevices.getDisplayMedia({
    video:{width:{ideal:1280},height:{ideal:720},frameRate:{ideal:30},cursor:'always'},
    audio:false
  }).then(function(s){
    var oldTracks=_screen.getVideoTracks();
    var newTrack=s.getVideoTracks()[0];
    _screen=s;
    document.getElementById('myv').srcObject=s;
    // replace in all active calls
    Object.keys(_viewers).forEach(function(pid){
      var call=_viewers[pid].call;
      if(call&&call.peerConnection){
        call.peerConnection.getSenders().forEach(function(sender){
          if(sender.track&&sender.track.kind==='video')sender.replaceTrack(newTrack).catch(function(){});
        });
      }
    });
    oldTracks.forEach(function(t){t.stop();});
    log('Screen source switched.');
  }).catch(function(){log('Source switch cancelled.');});
}
function endStream(){
  if(!confirm('End your live stream?'))return;
  broadcast({t:'ended'});
  if(_screen)_screen.getTracks().forEach(function(t){t.stop();});
  if(_mic)_mic.getTracks().forEach(function(t){t.stop();});
  if(_peer)_peer.destroy();
  _live=false;
  document.getElementById('myv').style.display='none';
  document.getElementById('ph').style.display='flex';
  document.getElementById('ph').querySelector('.ph-t').textContent='Stream Ended';
  document.getElementById('ph').querySelector('.ph-s').textContent='Reload this page to go live again.';
  document.getElementById('navdot').className='dot';
  document.getElementById('navstat').textContent='offline';document.getElementById('navstat').className='';
  document.getElementById('bEnd').style.display='none';
  document.getElementById('bStart').style.display='block';
  document.getElementById('bStart').disabled=false;
  setVC(0);
  log('Stream ended.');
}

// Load PeerJS
(function(){
  var s=document.createElement('script');
  s.src='https://cdnjs.cloudflare.com/ajax/libs/peerjs/1.5.2/peerjs.min.js';
  s.onload=function(){log('Ready — click Go Live to start.');};
  s.onerror=function(){log('Failed to load streaming library. Check your internet connection.');};
  document.body.appendChild(s);
})();
</script>
</body>
</html>
